<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>devotary.xyz</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #0a0d12;
      --panel: rgba(17, 23, 32, 0.88);
      --panel-line: rgba(140, 173, 209, 0.16);
      --text: #edf2f8;
      --muted: #9caabd;
      --accent: #8fd3ff;
      --accent-2: #6ee7b7;
      --shadow: 0 24px 80px rgba(0, 0, 0, 0.38);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      background:
        radial-gradient(circle at 15% 20%, rgba(143, 211, 255, 0.14), transparent 22rem),
        radial-gradient(circle at 85% 25%, rgba(110, 231, 183, 0.12), transparent 24rem),
        linear-gradient(180deg, #090c11 0%, #0d1219 100%);
      color: var(--text);
      font: 16px/1.6 "IBM Plex Sans", "Segoe UI", sans-serif;
    }

    .card {
      width: min(720px, 100%);
      padding: 36px 32px;
      border: 1px solid var(--panel-line);
      border-radius: 24px;
      background: var(--panel);
      box-shadow: var(--shadow);
      backdrop-filter: blur(10px);
    }

    .eyebrow {
      display: inline-block;
      margin-bottom: 12px;
      padding: 5px 10px;
      border-radius: 999px;
      border: 1px solid rgba(143, 211, 255, 0.2);
      background: rgba(143, 211, 255, 0.08);
      color: var(--accent);
      font-size: 0.8rem;
      font-weight: 700;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    h1 {
      margin: 0;
      font-size: clamp(2.2rem, 5vw, 4rem);
      line-height: 0.95;
      letter-spacing: -0.05em;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 14px;
      margin-top: 24px;
    }

    .button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 220px;
      padding: 14px 18px;
      border-radius: 14px;
      border: 1px solid rgba(143, 211, 255, 0.2);
      background: linear-gradient(135deg, rgba(143, 211, 255, 0.14), rgba(110, 231, 183, 0.12));
      color: var(--text);
      text-decoration: none;
      font-weight: 600;
      transition: transform 140ms ease, border-color 140ms ease, background 140ms ease;
    }

    .button:hover {
      transform: translateY(-1px);
      border-color: rgba(143, 211, 255, 0.4);
      background: linear-gradient(135deg, rgba(143, 211, 255, 0.2), rgba(110, 231, 183, 0.18));
    }

  </style>
</head>
<body>
  <main class="card">
    <div class="eyebrow">devotary.xyz</div>
    <h1>Notes, hardening, and small useful things.</h1>

    <div class="actions">
      <a class="button" href="/arch-hardening-checklist.html">Open Arch Hardening Checklist</a>
    </div>
  </main>
</body>
</html>
